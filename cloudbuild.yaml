steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/matdaanhub:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/matdaanhub:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/matdaanhub:$SHORT_SHA'

  # Step 3: Also push the latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/matdaanhub:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'matdaanhub'
      - '--image'
      - 'gcr.io/$PROJECT_ID/matdaanhub:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - >-
        SECRET_KEY=${_SECRET_KEY},
        GEMINI_API_KEY=${_GEMINI_API_KEY},
        GOOGLE_CLOUD_PROJECT=$PROJECT_ID,
        GOOGLE_TRANSLATE_ENABLED=true,
        FIREBASE_ENABLED=true,
        VERTEX_GROUNDING_ENABLED=false,
        VERTEX_LOCATION=us-central1,
        RATELIMIT_STORAGE_URI=memory://,
        LOG_LEVEL=INFO,
        DEBUG=false

images:
  - 'gcr.io/$PROJECT_ID/matdaanhub:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/matdaanhub:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

substitutions:
  # Set these in your Cloud Build trigger under "Substitution variables":
  # GCP Console → Cloud Build → Triggers → Edit → Substitution variables
  _GEMINI_API_KEY: ''
  _SECRET_KEY: ''

tags:
  - 'matdaanhub'
  - 'cloud-run'
  - 'gcp'
